{% extends "base.html" %}

{% block title %}Gadfly{% endblock %}

{% block banner_title_class %}home{% endblock %}
{% block banner_title %}Welcome to Gadfly{% endblock %}

{% block content %}
<div class="home-hero">

    <h3>Find Your Representatives</h3>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/" method="post">
        <input type="text" name="zip_code" placeholder="Enter your zip code">
        <button type="submit">Search</button>
    </form>

</div>
{% endblock %}
